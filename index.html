<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>P2P テトリス通信テスト</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>P2P 通信テスト</h1>

    <div class="box">
        <h3>1. あなたのID（友達に教えてね）</h3>
        <p id="my-id">ID生成中...</p>
    </div>

    <div class="box">
        <h3>2. 相手のIDを入れて接続</h3>
        <input type="text" id="peer-id-input" placeholder="相手のIDを入力">
        <button id="connect-btn">接続する</button>
    </div>

    <div class="box">
        <h3>3. メッセージ送信（テトリスのデータ代わり）</h3>
        <input type="text" id="message-input" placeholder="こんにちは" disabled>
        <button id="send-btn" disabled>送信</button>
    </div>

    <div class="box">
        <h3>受信ログ</h3>
        <div id="log"></div>
    </div>

    <script>
        // Peerオブジェクトの作成（PeerJSの無料サーバーに接続）
        const peer = new Peer();
        let conn = null; // 接続情報を入れる変数

        // 自分のIDが発行されたとき
        peer.on('open', (id) => {
            document.getElementById('my-id').textContent = id;
        });

        // 🟢 パターンA：相手から接続されたときの処理（ホスト側）
        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
            logMessage("相手が接続してきました！");
        });

        // 🔵 パターンB：自分から接続を仕掛けるときの処理（ゲスト側）
        document.getElementById('connect-btn').addEventListener('click', () => {
            const peerId = document.getElementById('peer-id-input').value;
            if (!peerId) return alert("IDを入力してください");
            
            conn = peer.connect(peerId);
            setupConnection();
            logMessage("接続を試みています...");
        });

        // 🤝 接続が確立した後のデータ送受信ルール
        function setupConnection() {
            conn.on('open', () => {
                logMessage("P2P接続が成功しました！チャット可能です。");
                // ボタン類を使えるようにする
                document.getElementById('message-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
            });

            // データを受信したとき（テトリスではここで相手の盤面データを受け取る）
            conn.on('data', (data) => {
                logMessage(`相手: ${data}`);
            });

            conn.on('close', () => {
                logMessage("接続が切断されました。");
            });
        }

        // ✉️ 送信ボタンを押したとき
        document.getElementById('send-btn').addEventListener('click', () => {
            const msg = document.getElementById('message-input').value;
            if (!msg || !conn) return;
            
            conn.send(msg); // 相手にデータを送信！
            logMessage(`自分: ${msg}`);
            document.getElementById('message-input').value = "";
        });

        // ログ出力用ヘルパー
        function logMessage(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<p>${msg}</p>`;
        }
    </script>
</body>
</html>
