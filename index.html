<body>

    <h1>P2P オンライン対戦テトリス</h1>

    <div id="connection-setup" style="margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; border-radius: 5px;">
        <label for="room-id-input"><strong>部屋番号（数字4桁など）: </strong></label>
        <input type="text" id="room-id-input" placeholder="例: 1234" style="padding: 5px; font-size: 16px; width: 100px;">
        
        <button id="make-room-btn" style="padding: 5px 10px; font-size: 16px; margin-left: 10px;">① 部屋を作る</button>
        <button id="join-room-btn" style="padding: 5px 10px; font-size: 16px;">② 部屋に入る</button>
        
        <span id="connection-status" style="margin-left: 15px; font-weight: bold; color: #ff0000;">未接続</span>
    </div>

    <div style="display: flex; gap: 40px; justify-content: center;">
        <div style="text-align: center;">
            <h2>あなた (PLAYER 1)</h2>
            <canvas id="local-canvas" width="300" height="600" style="border: 2px solid #333; background: #111;"></canvas>
            <p>SCORE: <span id="local-score">0</span></p>
        </div>
        <div style="text-align: center;">
            <h2>あいて (PLAYER 2)</h2>
            <canvas id="remote-canvas" width="300" height="600" style="border: 2px solid #333; background: #111;"></canvas>
            <p>SCORE: <span id="remote-score">0</span></p>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null;
        const statusEl = document.getElementById('connection-status');

        // プレフィックス（他のPeerJSアプリと衝突しないための合言葉）
        const ROOM_PREFIX = "github-tetris-room-";

        // 1. 部屋を作る（ホスト側）
        document.getElementById('make-room-btn').addEventListener('click', () => {
            const roomId = document.getElementById('room-id-input').value;
            if (!roomId) return alert("部屋番号を入力してください");

            statusEl.textContent = "部屋を開設中...";
            
            // 部屋番号をIDに指定してPeerオブジェクトを作成
            peer = new Peer(ROOM_PREFIX + roomId);

            peer.on('open', (id) => {
                statusEl.textContent = `部屋 ${roomId} で待機中... 友達に入ってもらってね！`;
                statusEl.style.color = "orange";
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("その部屋番号はすでに使われています！別の番号にしてください。");
                } else {
                    alert("エラーが発生しました: " + err.type);
                }
                statusEl.textContent = "未接続";
                statusEl.style.color = "red";
            });

            // ゲストが接続してきたとき
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });
        });

        // 2. 部屋に入る（ゲスト側）
        document.getElementById('join-room-btn').addEventListener('click', () => {
            const roomId = document.getElementById('room-id-input').value;
            if (!roomId) return alert("部屋番号を入力してください");

            statusEl.textContent = "接続中...";
            
            // ゲストはランダムなIDでPeerを作成し、ホストの部屋番号に接続する
            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect(ROOM_PREFIX + roomId);
                setupConnection();
            });
        });

        // 🤝 接続完了後の処理
        function setupConnection() {
            conn.on('open', () => {
                statusEl.textContent = "対戦接続完了！ゲーム開始できます。";
                statusEl.style.color = "green";
                
                // テストデータの送受信確認用（コンソールで確認）
                conn.send("READY");
            });

            conn.on('data', (data) => {
                console.log("相手からのデータ:", data);
                // ここに相手のテトリス盤面を描画する処理が入る
            });

            conn.on('close', () => {
                statusEl.textContent = "切断されました";
                statusEl.style.color = "red";
            });
        }
    </script>
</body>
    </script>
</body>
</html>
